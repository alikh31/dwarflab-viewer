name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # node-gyp (used to build the native @abandonware/noble module) needs
      # Python's distutils, which was removed from the stdlib in Python 3.12.
      # Pin 3.11 so the native build works on all runners.
      - name: Set up Python 3.11 (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Installs deps and runs the patch-package postinstall (jmuxer patch) and
      # the native noble rebuild. We remove the lockfile first to work around
      # npm's optional-dependency bug (npm/cli#4828): with the lockfile present,
      # npm skips the platform-specific @rollup/rollup-* binary and the Vite
      # build fails with "Cannot find module @rollup/rollup-<platform>". A fresh
      # resolve installs the correct binary for this runner's OS/arch.
      - name: Install dependencies
        shell: bash
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
        env:
          npm_config_build_from_source: "false"

      - name: Typecheck
        run: npm run typecheck

      - name: Build (electron-vite)
        run: npm run build
