name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck & build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Installs deps and runs the patch-package postinstall (jmuxer patch) and
      # any native rebuild (noble). build_from_source stays off so noble uses
      # its prebuilt binaries where available.
      - name: Install dependencies
        run: npm ci
        env:
          npm_config_build_from_source: "false"

      - name: Typecheck
        run: npm run typecheck

      - name: Build (electron-vite)
        run: npm run build
