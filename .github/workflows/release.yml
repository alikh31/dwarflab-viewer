name: Release

# Builds desktop installers for macOS, Windows, and Linux when a version tag is
# pushed (e.g. `git push origin v0.1.0`), and attaches them to a GitHub Release
# for that tag. The release is created as a DRAFT so you can review the assets
# and publish it manually. Binaries are unsigned (see README).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release and upload installers

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Create the draft release once, up front, so the three platform jobs upload
  # into the same release instead of racing to create it.
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches package version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version ($PKG). Bump the version to match the tag."
            exit 1
          fi

      - name: Create or reuse draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists — reusing."
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi

  build:
    name: Build & upload (${{ matrix.os }})
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # electron-builder rebuilds the native BLE stack (noble → libusb) against
      # Electron's headers when packaging. On Linux the libusb build needs the
      # udev development headers, which aren't on the runner by default.
      - name: Install Linux native build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # node-gyp (native @abandonware/noble build) needs Python distutils,
      # removed from the stdlib in Python 3.12 — pin 3.11.
      - name: Set up Python 3.11 (for node-gyp)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Remove the lockfile before installing to dodge npm's optional-dependency
      # bug (npm/cli#4828) that can skip the platform-specific @rollup/rollup-*
      # binary the Vite build needs. A fresh resolve installs the right one.
      - name: Install dependencies
        shell: bash
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
        env:
          npm_config_build_from_source: "false"

      - name: Build renderer/main/preload
        run: npm run build

      # electron-builder packages for this runner's platform and uploads the
      # artifacts to the draft GitHub Release (publish config: github in
      # electron-builder.yml). No signing certificates are configured, so the
      # builds are unsigned.
      - name: Package & publish ${{ matrix.platform }}
        run: npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
